<mat-toolbar class="main-toolbar" [class.navbar-transparent]="isAuthRoute()">
  <div class="toolbar-content">
    <div class="brand" routerLink="/">
      <mat-icon color="primary">storefront</mat-icon>
      <span>MarketCore</span>
    </div>
    
    <span class="spacer"></span>
    
    <nav class="nav-links">
      <button mat-button routerLink="/catalog">Catálogo</button>
      
      @if (authService.isAuthenticated()) {
        <button mat-button routerLink="/favorites">Favoritos</button>
        <button mat-button routerLink="/seller">Vender</button>
        <button mat-button routerLink="/inbox">Inbox</button>
        
        <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu-btn" aria-label="Menú de usuario">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu" xPosition="before">
          <div class="user-info-header">
            <p class="user-name">{{ authService.currentUser()?.name }}</p>
            <p class="user-email">{{ authService.currentUser()?.email }}</p>
          </div>
          <mat-divider></mat-divider>
          <button mat-menu-item routerLink="/seller">
            <mat-icon>dashboard</mat-icon>
            <span>Mi Panel</span>
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Cerrar Sesión</span>
          </button>
        </mat-menu>
      } @else {
        <div class="auth-buttons">
          <button mat-button routerLink="/auth/login">Ingresar</button>
          <button mat-flat-button color="primary" routerLink="/auth/register">Regístrate</button>
        </div>
      }
    </nav>
  </div>
</mat-toolbar>

<main class="main-content" [class.auth-surface]="isAuthRoute()">
  <router-outlet></router-outlet>
</main>
