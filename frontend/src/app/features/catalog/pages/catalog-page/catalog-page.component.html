<div class="catalog-container">
  <header class="catalog-header">
    <div class="header-title">
      <h1>Descubre Productos</h1>
      <p>Encuentra lo que buscas al mejor precio</p>
    </div>
    <div class="header-search">
      <app-search-bar (search)="onSearch($event)"></app-search-bar>
    </div>
  </header>

  @if (isLoading()) {
    <div class="spinner-container">
      <mat-progress-spinner mode="indeterminate" color="primary" diameter="48"></mat-progress-spinner>
    </div>
  } @else {
    <div class="product-grid">
      @for (product of products(); track product.id) {
        <app-product-card [product]="product"></app-product-card>
      } @empty {
        <div class="no-results">
          <mat-icon>search_off</mat-icon>
          <h3>No encontramos resultados</h3>
          <p>Intenta con otros términos o elimina los filtros de búsqueda.</p>
        </div>
      }
    </div>
  }
</div>
