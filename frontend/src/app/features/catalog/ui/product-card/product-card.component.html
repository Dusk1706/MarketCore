<mat-card class="product-card" [class.product-card--sold]="product().is_sold">
  <div class="image-wrapper">
    @if (product().image_url) {
      <img mat-card-image [src]="product().image_url" [alt]="product().title">
    } @else {
      <div class="placeholder-img">
        <mat-icon>image_not_supported</mat-icon>
      </div>
    }
    
    @if (product().is_sold) {
      <div class="sold-badge">VENDIDO</div>
    }

    @if (isOwnProduct()) {
      <div class="own-product-badge">TU ANUNCIO</div>
    }

    <button
      mat-icon-button
      class="favorite-btn"
      [class.favorite-btn--active]="isFavoriteActive()"
      (click)="toggleFavorite($event)"
      [disabled]="isFavoritePending()"
      [attr.aria-label]="favoriteAriaLabel()">
      <mat-icon>{{ favoriteIcon() }}</mat-icon>
    </button>
  </div>
  
  <mat-card-content class="card-body">
    <div class="meta-info">
      <span class="category">{{ product().category_slug }}</span>
    </div>
    <mat-card-title class="title">{{ product().title }}</mat-card-title>
    
    <div class="price">{{ product().price | currency }}</div>
  </mat-card-content>
  
  <mat-card-actions class="card-actions">
    <button mat-flat-button color="primary" [routerLink]="['/catalog/product', product().id]" class="action-btn">
      {{ product().is_sold ? 'Ver publicación' : 'Ver detalles' }}
    </button>
  </mat-card-actions>
</mat-card>
