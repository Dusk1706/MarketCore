openapi: 3.0.3
info:
  title: MarketCore API
  description: API para el marketplace de compra/venta de artículos usados.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Servidor de Desarrollo

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Registro de nuevo usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Usuario creado exitosamente. Se envía correo de verificación.
        '400':
          description: Datos inválidos o usuario ya existe

  /auth/login:
    post:
      tags:
        - Auth
      summary: Inicio de sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '401':
          description: Credenciales incorrectas

  /auth/verify-email/{token}:
    get:
      tags:
        - Auth
      summary: Verificar correo electrónico
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Correo verificado exitosamente
        '400':
          description: Token inválido o expirado
        '404':
          description: Usuario no encontrado

  /auth/request-password-reset:
    post:
      tags:
        - Auth
      summary: Solicitar reseteo de contraseña
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Correo de reseteo enviado (si existe el email)

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Restablecer contraseña
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Contraseña restablecida exitosamente
        '400':
          description: Token inválido o expirado
        '404':
          description: Usuario no encontrado

  /categories:
    get:
      tags:
        - Categories
      summary: Listar todas las categorías disponibles
      responses:
        '200':
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /products:
    get:
      tags:
        - Products
      summary: Listar productos con filtros y paginación
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category_slug
          in: query
          schema:
            type: string
        - name: min_price
          in: query
          schema:
            type: number
        - name: max_price
          in: query
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
        - name: seller_only
          in: query
          description: Si es true, solo devuelve productos del usuario autenticado
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de productos
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  meta:
                    type: object
                    properties:
                      total: { type: integer }
                      page: { type: integer }
                      per_page: { type: integer }
                      pages: { type: integer }

    post:
      tags:
        - Products
      summary: Crear nuevo producto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Producto creado
        '401':
          description: No autorizado

  /products/{id}:
    get:
      tags:
        - Products
      summary: Detalle de un producto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Datos del producto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Producto no encontrado

    put:
      tags:
        - Products
      summary: Reemplazo total de un producto existente
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Producto actualizado
        '401':
          description: No autorizado
        '403':
          description: Prohibido (no es el dueño)
        '404':
          description: No encontrado

    patch:
      tags:
        - Products
      summary: Actualización parcial de un producto
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Producto actualizado parcialmente
        '401':
          description: No autorizado
        '403':
          description: Prohibido (no es el dueño)
        '404':
          description: No encontrado

    delete:
      tags:
        - Products
      summary: Eliminar un producto
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Producto eliminado
        '401':
          description: No autorizado
        '403':
          description: Prohibido (no es el dueño)
        '404':
          description: No encontrado

  /users/me:
    get:
      tags:
        - Users
      summary: Obtener perfil del usuario actual
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: No autorizado
    put:
      tags:
        - Users
      summary: Actualizar perfil del usuario
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
      responses:
        '200':
          description: Perfil actualizado
        '400':
          description: Error de validación

  /users/me/password:
    put:
      tags:
        - Users
      summary: Cambiar contraseña
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Contraseña actualizada
        '401':
          description: Contraseña actual incorrecta

  /users/me/favorites:
    get:
      tags:
        - Favorites
      summary: Listar productos favoritos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de favoritos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /users/me/favorites/{product_id}:
    post:
      tags:
        - Favorites
      summary: Añadir producto a favoritos
      security:
        - bearerAuth: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Añadido a favoritos
        '404':
          description: Producto no encontrado
    delete:
      tags:
        - Favorites
      summary: Eliminar producto de favoritos
      security:
        - bearerAuth: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Eliminado de favoritos

  /uploads:
    post:
      tags:
        - Uploads
      summary: Subir una imagen
      description: Sube una imagen (PNG, JPG, WEBP) y retorna la URL pública para usarla en la creación de productos.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Imagen subida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  url: { type: string, description: "URL pública de la imagen" }
        '400':
          description: Archivo inválido o no proporcionado

  /orders:
    post:
      tags:
        - Orders
      summary: Crear orden de compra
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Orden creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/me:
    get:
      tags:
        - Orders
      summary: Mis órdenes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de órdenes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{id}/reviews:
    post:
      tags:
        - Reviews
      summary: Dejar reseña en una orden completada
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '201':
          description: Reseña creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /users/{id}/reviews:
    get:
      tags:
        - Reviews
      summary: Ver reseñas de un usuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reseñas y stats del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReviewsResponse'

  /conversations:
    post:
      tags:
        - Messages
      summary: Iniciar conversación
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationCreate'
      responses:
        '201':
          description: Conversación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'

    get:
      tags:
        - Messages
      summary: Listar mis conversaciones
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de conversaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'

  /conversations/{id}/messages:
    get:
      tags:
        - Messages
      summary: Obtener mensajes de una conversación
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de mensajes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'

    post:
      tags:
        - Messages
      summary: Enviar un mensaje a la conversación
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreate'
      responses:
        '201':
          description: Mensaje enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegister:
      type: object
      required: [email, password, name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string }

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }

    AuthToken:
      type: object
      properties:
        access_token: { type: string }
        user:
          $ref: '#/components/schemas/User'

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }

    Product:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        price: { type: number }
        category_slug: { type: string }
        is_sold: { type: boolean }
        image_url: { type: string }
        created_at: { type: string, format: date-time }
        seller:
          $ref: '#/components/schemas/User'
        trust_signals:
          type: object
          properties:
            average_rating: { type: number }
            total_sales: { type: integer }

    ProductCreate:
      type: object
      required: [title, description, price, category_slug]
      properties:
        title: { type: string }
        description: { type: string }
        price: { type: number, minimum: 0 }
        category_slug: { type: string }
        image_url: { type: string, description: "URL de la imagen" }

    ProductUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        price: { type: number, minimum: 0 }
        category_slug: { type: string }
        image_url: { type: string }
        is_sold: { type: boolean }

    OrderCreate:
      type: object
      required: [product_id]
      properties:
        product_id: { type: integer }

    Order:
      type: object
      properties:
        id: { type: integer }
        buyer_id: { type: integer }
        seller_id: { type: integer }
        product_id: { type: integer }
        total_amount: { type: number }
        status: { type: string }
        payment_gateway_id: { type: string }
        created_at: { type: string, format: date-time }
        product:
          $ref: '#/components/schemas/Product'

    ReviewCreate:
      type: object
      required: [rating]
      properties:
        rating: { type: integer }
        comment: { type: string }

    Review:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        reviewer_id: { type: integer }
        reviewee_id: { type: integer }
        rating: { type: integer }
        comment: { type: string }
        created_at: { type: string, format: date-time }
        reviewer:
          $ref: '#/components/schemas/User'

    UserReviewsResponse:
      type: object
      properties:
        average_rating: { type: number }
        total_sales: { type: integer }
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'

    ConversationCreate:
      type: object
      required: [product_id, content]
      properties:
        product_id: { type: integer }
        content: { type: string }

    Conversation:
      type: object
      properties:
        id: { type: integer }
        buyer_id: { type: integer }
        seller_id: { type: integer }
        product_id: { type: integer }
        created_at: { type: string, format: date-time }
        product:
          $ref: '#/components/schemas/Product'
        buyer:
          $ref: '#/components/schemas/User'
        seller:
          $ref: '#/components/schemas/User'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'

    MessageCreate:
      type: object
      required: [content]
      properties:
        content: { type: string }

    Message:
      type: object
      properties:
        id: { type: integer }
        conversation_id: { type: integer }
        sender_id: { type: integer }
        content: { type: string }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }
        sender:
          $ref: '#/components/schemas/User'