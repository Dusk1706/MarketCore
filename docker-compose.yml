services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: marketcore
      POSTGRES_PASSWORD: marketcore_pass
      POSTGRES_DB: marketcore_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketcore -d marketcore_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    command: sh -c "flask db upgrade && python seed.py && gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 wsgi:app"
    environment:
      DATABASE_URL: postgresql://marketcore:marketcore_pass@db:5432/marketcore_db
      JWT_SECRET_KEY: dev_secret_key
      MAX_CONTENT_LENGTH_MB: 20
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
      FLASK_APP: wsgi:app
      FLASK_ENV: production
      SWAGGER_TEMPLATE_PATH: /app/docs/api/openapi.yaml
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
