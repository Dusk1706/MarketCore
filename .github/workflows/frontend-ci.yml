name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Configure Chrome wrapper (no sandbox)
        env:
          CHROME_BIN_REAL: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          cat > "$RUNNER_TEMP/chrome-no-sandbox" << 'EOF'
          #!/usr/bin/env bash
          exec "${CHROME_BIN_REAL}" --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage "$@"
          EOF
          chmod +x "$RUNNER_TEMP/chrome-no-sandbox"

      - name: Run unit tests (headless)
        env:
          CHROME_BIN: ${{ runner.temp }}/chrome-no-sandbox
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build production bundle
        run: npm run build -- --configuration production
